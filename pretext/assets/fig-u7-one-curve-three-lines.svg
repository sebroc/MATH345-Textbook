<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">One curve with three affine approximations</title>
  <desc id="desc">A cubic curve is shown with a Taylor line, a continuous least-squares line, and a sampled least-squares line. The three lines differ, showing that best approximation depends on the error measure.</desc>
  <rect width="1200" height="760" fill="#ffffff"/>
  <g stroke="#d7dee8" stroke-width="2">
    <line x1="120" y1="620" x2="1100" y2="620"/>
    <line x1="120" y1="520" x2="1100" y2="520"/>
    <line x1="120" y1="420" x2="1100" y2="420"/>
    <line x1="120" y1="320" x2="1100" y2="320"/>
    <line x1="120" y1="220" x2="1100" y2="220"/>
    <line x1="120" y1="120" x2="1100" y2="120"/>
    <line x1="220" y1="90" x2="220" y2="640"/>
    <line x1="420" y1="90" x2="420" y2="640"/>
    <line x1="620" y1="90" x2="620" y2="640"/>
    <line x1="820" y1="90" x2="820" y2="640"/>
    <line x1="1020" y1="90" x2="1020" y2="640"/>
  </g>
  <g stroke="#1f2937" stroke-width="4" fill="none">
    <line x1="100" y1="620" x2="1120" y2="620"/>
    <line x1="220" y1="650" x2="220" y2="80"/>
  </g>
  <path d="M 120 548 C 230 532 300 486 376 396 C 466 290 565 168 690 142 C 802 118 922 160 1080 252" fill="none" stroke="#111827" stroke-width="7" stroke-linecap="round"/>
  <line x1="120" y1="430" x2="1080" y2="170" stroke="#2563eb" stroke-width="6"/>
  <line x1="120" y1="500" x2="1080" y2="118" stroke="#dc2626" stroke-width="6"/>
  <line x1="120" y1="540" x2="1080" y2="96" stroke="#16a34a" stroke-width="6"/>
  <g fill="#111827">
    <circle cx="220" cy="496" r="8"/>
    <circle cx="380" cy="392" r="8"/>
    <circle cx="560" cy="188" r="8"/>
    <circle cx="760" cy="136" r="8"/>
    <circle cx="940" cy="182" r="8"/>
  </g>
  <g font-family="Latin Modern Roman, Georgia, serif" font-size="30" fill="#111827">
    <text x="1115" y="636">x</text>
    <text x="190" y="78">y</text>
    <text x="260" y="86" font-weight="700">same cubic, three notions of best line</text>
  </g>
  <g font-family="Latin Modern Roman, Georgia, serif" font-size="25">
    <rect x="710" y="436" width="360" height="150" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="735" y1="470" x2="800" y2="470" stroke="#111827" stroke-width="7"/>
    <text x="820" y="479" fill="#111827">cubic p(x)</text>
    <line x1="735" y1="508" x2="800" y2="508" stroke="#2563eb" stroke-width="6"/>
    <text x="820" y="517" fill="#111827">Taylor line</text>
    <line x1="735" y1="546" x2="800" y2="546" stroke="#dc2626" stroke-width="6"/>
    <text x="820" y="555" fill="#111827">continuous LS</text>
    <line x1="735" y1="584" x2="800" y2="584" stroke="#16a34a" stroke-width="6"/>
    <text x="820" y="593" fill="#111827">sampled LS</text>
  </g>
</svg>
