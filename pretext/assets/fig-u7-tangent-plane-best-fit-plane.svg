      <circle cx="420" cy="470" r="8"/>
      <circle cx="528" cy="408" r="8"/>
      <circle cx="640" cy="382" r="8"/>
      <circle cx="758" cy="420" r="8"/>
      <circle cx="880" cy="390" r="8"/>
      <circle cx="982" cy="302" r="8"/>
      <circle cx="592" cy="392" r="12" fill="#7c3aed"/>
