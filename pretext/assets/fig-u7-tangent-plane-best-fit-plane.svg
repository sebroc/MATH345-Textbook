  <rect width="1200" height="760" fill="#ffffff"/>
  <g transform="translate(0,20)">
    <path d="M 165 500 C 300 315 470 255 610 318 C 760 386 890 355 1045 190 L 1085 288 C 925 460 760 505 610 442 C 455 378 310 430 165 610 Z" fill="#e0f2fe" stroke="#0369a1" stroke-width="4"/>
    <path d="M 220 522 C 360 380 490 344 610 396 C 750 456 880 426 1000 300" fill="none" stroke="#0284c7" stroke-width="3" opacity="0.65"/>
    <path d="M 260 466 C 400 338 515 315 640 364 C 760 412 870 393 972 286" fill="none" stroke="#0284c7" stroke-width="3" opacity="0.65"/>
    <path d="M 315 416 C 438 318 550 304 665 340 C 770 374 850 360 930 276" fill="none" stroke="#0284c7" stroke-width="3" opacity="0.65"/>
    <path d="M 320 594 C 390 470 405 370 385 300" fill="none" stroke="#0284c7" stroke-width="3" opacity="0.55"/>
    <path d="M 510 510 C 565 415 580 330 560 265" fill="none" stroke="#0284c7" stroke-width="3" opacity="0.55"/>
    <path d="M 700 466 C 745 385 770 310 755 242" fill="none" stroke="#0284c7" stroke-width="3" opacity="0.55"/>
    <path d="M 895 405 C 940 335 975 270 972 205" fill="none" stroke="#0284c7" stroke-width="3" opacity="0.55"/>
    <polygon points="235,575 965,382 1018,465 290,650" fill="#dcfce7" stroke="#16a34a" stroke-width="5" opacity="0.78"/>
    <polygon points="470,398 650,330 728,388 548,458" fill="#dbeafe" stroke="#2563eb" stroke-width="5" opacity="0.88"/>
    <g fill="#111827">
