<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 460" role="img" aria-labelledby="title desc">
  <title id="title">A 2 by 3 matrix maps the unit sphere to an ellipse</title>
  <desc id="desc">The left panel shows a unit sphere in three-dimensional coordinates. The right panel shows the ellipse in the plane that is the image of the sphere under the matrix A with rows 4, 11, 14 and 8, 7, -2. The principal semiaxis endpoints are labeled (18, 6) and (3, -9).</desc>
  <!-- Original SVG generated from the SVD of A = [[4, 11, 14], [8, 7, -2]].
       The nonzero singular values are sqrt(360) and sqrt(90). The output
       principal semiaxis vectors are (18, 6) and (3, -9). -->
  <defs>
    <radialGradient id="sphereGradient" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="42%" stop-color="#dfe6ff"/>
      <stop offset="74%" stop-color="#8d9bdf"/>
      <stop offset="100%" stop-color="#5363b0"/>
    </radialGradient>
    <linearGradient id="ellipseGradient" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#e9f4e4"/>
      <stop offset="100%" stop-color="#b7d6ad"/>
    </linearGradient>
    <clipPath id="sphereClip" clipPathUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="121"/>
    </clipPath>
    <marker id="arrowhead" markerHeight="9" markerWidth="9" orient="auto" refX="7" refY="4.5">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#222222"/>
    </marker>
  </defs>

  <rect width="1100" height="460" fill="#ffffff"/>

  <g id="domain-panel" transform="translate(240 245)">
    <g id="domain-axes" opacity="0.75">
      <line x1="0" y1="0" x2="-148" y2="92" stroke="#222222" stroke-width="3.5" marker-end="url(#arrowhead)"/>
      <line x1="0" y1="0" x2="164" y2="38" stroke="#222222" stroke-width="3.5" marker-end="url(#arrowhead)"/>
      <line x1="0" y1="0" x2="0" y2="-178" stroke="#222222" stroke-width="3.5" marker-end="url(#arrowhead)"/>
    </g>
    <text x="-185" y="128" font-family="Arial, sans-serif" font-size="28" font-style="italic">x1</text>
    <text x="179" y="47" font-family="Arial, sans-serif" font-size="28" font-style="italic">x2</text>
    <text x="-18" y="-198" font-family="Arial, sans-serif" font-size="28" font-style="italic">x3</text>

    <circle cx="0" cy="0" r="122" fill="url(#sphereGradient)" opacity="0.76" stroke="#29306f" stroke-width="2.5"/>
    <g id="sphere-grid" clip-path="url(#sphereClip)" fill="none" stroke-linecap="round">
      <ellipse cx="0" cy="0" rx="122" ry="28" stroke="#25306f" stroke-width="2.1" opacity="0.95"/>
      <ellipse cx="0" cy="-68" rx="95" ry="18" stroke="#6b74b9" stroke-width="1.15" opacity="0.46"/>
      <ellipse cx="0" cy="-40" rx="113" ry="24" stroke="#6b74b9" stroke-width="1.15" opacity="0.44"/>
      <ellipse cx="0" cy="40" rx="113" ry="24" stroke="#6b74b9" stroke-width="1.15" opacity="0.38"/>
      <ellipse cx="0" cy="68" rx="95" ry="18" stroke="#6b74b9" stroke-width="1.15" opacity="0.34"/>
    </g>
  </g>

  <g id="codomain-panel" transform="translate(760 245)">
    <line x1="-245" y1="0" x2="252" y2="0" stroke="#222222" stroke-width="3" opacity="0.76" marker-end="url(#arrowhead)"/>
    <line x1="0" y1="155" x2="0" y2="-170" stroke="#222222" stroke-width="3" opacity="0.76" marker-end="url(#arrowhead)"/>
    <text x="267" y="8" font-family="Arial, sans-serif" font-size="28" font-style="italic">y1</text>
    <text x="-18" y="-188" font-family="Arial, sans-serif" font-size="28" font-style="italic">y2</text>

    <g stroke="#222222" stroke-width="2" opacity="0.76">
      <line x1="-210" y1="-10" x2="-210" y2="10"/>
      <line x1="-175" y1="-10" x2="-175" y2="10"/>
      <line x1="-140" y1="-10" x2="-140" y2="10"/>
      <line x1="-105" y1="-10" x2="-105" y2="10"/>
      <line x1="-70" y1="-10" x2="-70" y2="10"/>
      <line x1="-35" y1="-10" x2="-35" y2="10"/>
      <line x1="35" y1="-10" x2="35" y2="10"/>
      <line x1="70" y1="-10" x2="70" y2="10"/>
      <line x1="105" y1="-10" x2="105" y2="10"/>
      <line x1="140" y1="-10" x2="140" y2="10"/>
      <line x1="175" y1="-10" x2="175" y2="10"/>
      <line x1="210" y1="-10" x2="210" y2="10"/>
      <line x1="-10" y1="-140" x2="10" y2="-140"/>
      <line x1="-10" y1="-105" x2="10" y2="-105"/>
      <line x1="-10" y1="-70" x2="10" y2="-70"/>
      <line x1="-10" y1="-35" x2="10" y2="-35"/>
      <line x1="-10" y1="35" x2="10" y2="35"/>
      <line x1="-10" y1="70" x2="10" y2="70"/>
      <line x1="-10" y1="105" x2="10" y2="105"/>
      <line x1="-10" y1="140" x2="10" y2="140"/>
    </g>

    <ellipse cx="0" cy="0" rx="199.223" ry="99.612" transform="rotate(-18.435)" fill="url(#ellipseGradient)" fill-opacity="0.74" stroke="#8a1438" stroke-width="4"/>
    <line x1="-189" y1="63" x2="189" y2="-63" stroke="#202020" stroke-width="3"/>
    <line x1="-31.5" y1="-94.5" x2="31.5" y2="94.5" stroke="#202020" stroke-width="3"/>
    <circle cx="189" cy="-63" r="6" fill="#111111"/>
    <circle cx="31.5" cy="94.5" r="6" fill="#111111"/>
    <text x="203" y="-61" font-family="Arial, sans-serif" font-size="24" fill="#111111">(18, 6)</text>
    <text x="43" y="120" font-family="Arial, sans-serif" font-size="24" fill="#111111">(3, -9)</text>
  </g>
</svg>
