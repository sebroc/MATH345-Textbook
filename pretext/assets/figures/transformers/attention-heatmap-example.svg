<svg xmlns="http://www.w3.org/2000/svg" width="620" height="520" viewBox="0 0 620 520" role="img" aria-labelledby="title desc">
  <title id="title">Causal attention heatmap</title>
  <desc id="desc">A four by four attention matrix with zeros above the diagonal.</desc>
  <rect width="620" height="520" fill="#ffffff"/>
  <style>
    text { font-family: Arial, sans-serif; fill: #121212; }
    .label { font-size: 18px; }
    .title { font-size: 24px; font-weight: 700; }
    .cell { stroke: #ffffff; stroke-width: 3; }
  </style>
  <text x="190" y="42" class="title">Tiny causal attention matrix</text>
  <g transform="translate(135,95)">
    <text x="45" y="-20" class="label">the</text>
    <text x="125" y="-20" class="label">cat</text>
    <text x="205" y="-20" class="label">sat</text>
    <text x="295" y="-20" class="label">.</text>
    <text x="-65" y="48" class="label">the</text>
    <text x="-65" y="128" class="label">cat</text>
    <text x="-65" y="208" class="label">sat</text>
    <text x="-65" y="288" class="label">.</text>
    <rect x="0" y="0" width="80" height="80" fill="#9B0000" class="cell"/>
    <rect x="80" y="0" width="80" height="80" fill="#E1E5E7" class="cell"/>
    <rect x="160" y="0" width="80" height="80" fill="#E1E5E7" class="cell"/>
    <rect x="240" y="0" width="80" height="80" fill="#E1E5E7" class="cell"/>
    <rect x="0" y="80" width="80" height="80" fill="#C5050C" class="cell"/>
    <rect x="80" y="80" width="80" height="80" fill="#9B0000" class="cell"/>
    <rect x="160" y="80" width="80" height="80" fill="#E1E5E7" class="cell"/>
    <rect x="240" y="80" width="80" height="80" fill="#E1E5E7" class="cell"/>
    <rect x="0" y="160" width="80" height="80" fill="#C5050C" class="cell"/>
    <rect x="80" y="160" width="80" height="80" fill="#D76A6A" class="cell"/>
    <rect x="160" y="160" width="80" height="80" fill="#9B0000" class="cell"/>
    <rect x="240" y="160" width="80" height="80" fill="#E1E5E7" class="cell"/>
    <rect x="0" y="240" width="80" height="80" fill="#D76A6A" class="cell"/>
    <rect x="80" y="240" width="80" height="80" fill="#C5050C" class="cell"/>
    <rect x="160" y="240" width="80" height="80" fill="#D76A6A" class="cell"/>
    <rect x="240" y="240" width="80" height="80" fill="#9B0000" class="cell"/>
  </g>
  <text x="190" y="470" class="label">future-token positions are masked</text>
</svg>
