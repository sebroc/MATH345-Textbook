<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-labelledby="title desc">
  <title id="title">Tokens to matrix</title>
  <desc id="desc">Four tokens point to four row vectors stacked into a token matrix.</desc>
  <rect width="760" height="360" fill="#ffffff"/>
  <style>
    text { font-family: Arial, sans-serif; fill: #121212; }
    .token { font-size: 24px; font-weight: 700; }
    .label { font-size: 20px; }
    .small { font-size: 17px; }
    .box { fill: #f7f7f7; stroke: #C5050C; stroke-width: 2; rx: 8; }
    .row { stroke: #121212; stroke-width: 2; }
    .arrow { stroke: #9B0000; stroke-width: 3; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9B0000"/>
    </marker>
  </defs>
  <text x="70" y="55" class="token">"the"</text>
  <text x="190" y="55" class="token">"cat"</text>
  <text x="310" y="55" class="token">"sat"</text>
  <text x="430" y="55" class="token">"."</text>
  <line x1="95" y1="75" x2="95" y2="125" class="arrow"/>
  <line x1="215" y1="75" x2="215" y2="125" class="arrow"/>
  <line x1="335" y1="75" x2="335" y2="125" class="arrow"/>
  <line x1="445" y1="75" x2="445" y2="125" class="arrow"/>
  <text x="80" y="160" class="label">x1</text>
  <text x="200" y="160" class="label">x2</text>
  <text x="320" y="160" class="label">x3</text>
  <text x="435" y="160" class="label">x4</text>
  <rect x="545" y="80" width="155" height="225" class="box"/>
  <text x="515" y="205" class="label">X =</text>
  <line x1="570" y1="125" x2="675" y2="125" class="row"/>
  <line x1="570" y1="170" x2="675" y2="170" class="row"/>
  <line x1="570" y1="215" x2="675" y2="215" class="row"/>
  <line x1="570" y1="260" x2="675" y2="260" class="row"/>
  <text x="590" y="115" class="small">row x1</text>
  <text x="590" y="160" class="small">row x2</text>
  <text x="590" y="205" class="small">row x3</text>
  <text x="590" y="250" class="small">row x4</text>
  <path d="M475 150 C510 150, 515 160, 545 160" fill="none" class="arrow"/>
</svg>
