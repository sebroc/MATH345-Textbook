<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-labelledby="title desc">
  <title id="title">Low-rank update</title>
  <desc id="desc">W new equals W plus the product of a tall skinny matrix and a short wide matrix.</desc>
  <rect width="760" height="360" fill="#ffffff"/>
  <style>
    text { font-family: Arial, sans-serif; fill: #121212; }
    .label { font-size: 24px; font-weight: 700; }
    .small { font-size: 17px; }
    .matrix { fill: #f7f7f7; stroke: #C5050C; stroke-width: 2; rx: 6; }
    .update { fill: #fff5f5; stroke: #9B0000; stroke-width: 2; rx: 6; }
  </style>
  <text x="55" y="65" class="label">W_new = W + B C</text>
  <rect x="70" y="115" width="140" height="150" class="matrix"/>
  <text x="125" y="195" class="label">W</text>
  <text x="95" y="290" class="small">m by n</text>
  <text x="245" y="200" class="label">+</text>
  <rect x="310" y="90" width="70" height="200" class="update"/>
  <text x="337" y="195" class="label">B</text>
  <text x="300" y="315" class="small">m by r</text>
  <text x="405" y="200" class="label">x</text>
  <rect x="460" y="140" width="190" height="70" class="update"/>
  <text x="550" y="184" class="label">C</text>
  <text x="505" y="240" class="small">r by n</text>
  <text x="180" y="335" class="small">BC is large, but rank at most r</text>
</svg>
