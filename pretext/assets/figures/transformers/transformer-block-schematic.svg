<svg xmlns="http://www.w3.org/2000/svg" width="700" height="650" viewBox="0 0 700 650" role="img" aria-labelledby="title desc">
  <title id="title">Transformer block schematic</title>
  <desc id="desc">A simple vertical schematic of a transformer block as an information processor.</desc>
  <rect width="700" height="650" fill="#ffffff"/>
  <style>
    text { font-family: Arial, sans-serif; fill: #121212; }
    .box { fill: #f7f7f7; stroke: #C5050C; stroke-width: 2; rx: 8; }
    .label { font-size: 19px; font-weight: 700; }
    .arrow { stroke: #9B0000; stroke-width: 3; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9B0000"/>
    </marker>
  </defs>
  <g transform="translate(190,35)">
    <rect width="320" height="50" class="box"/><text x="150" y="32" text-anchor="middle" class="label">X</text>
    <line x1="160" y1="50" x2="160" y2="85" class="arrow"/>
    <rect y="85" width="320" height="55" class="box"/><text x="160" y="119" text-anchor="middle" class="label">linear maps: Q, K, V</text>
    <line x1="160" y1="140" x2="160" y2="175" class="arrow"/>
    <rect y="175" width="320" height="55" class="box"/><text x="160" y="209" text-anchor="middle" class="label">dot-product scores</text>
    <line x1="160" y1="230" x2="160" y2="265" class="arrow"/>
    <rect y="265" width="320" height="55" class="box"/><text x="160" y="299" text-anchor="middle" class="label">softmax / mask</text>
    <line x1="160" y1="320" x2="160" y2="355" class="arrow"/>
    <rect y="355" width="320" height="55" class="box"/><text x="160" y="389" text-anchor="middle" class="label">weighted values</text>
    <line x1="160" y1="410" x2="160" y2="445" class="arrow"/>
    <rect y="445" width="320" height="55" class="box"/><text x="160" y="479" text-anchor="middle" class="label">residual update</text>
    <line x1="160" y1="500" x2="160" y2="535" class="arrow"/>
    <rect y="535" width="320" height="55" class="box"/><text x="160" y="569" text-anchor="middle" class="label">feed-forward layer -> new X</text>
  </g>
</svg>
